<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="dingbat_azul_redondo.png" />
  <title>Jotapê Jorge</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400&family=Merriweather:wght@300;400;700&family=Barlow+Condensed:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --navy: #1a2d40;
      --blue: #003e6a;
      --muted: #aaa;
      --serif: 'Merriweather', Georgia, serif;
      --italic: 'Playfair Display', Georgia, serif;
      --cond: 'Barlow Condensed', sans-serif;
    }

    html, body { overflow-x: hidden; }

    body {
      background: #fff;
      color: var(--navy);
      font-family: var(--cond);
    }

    /* NAV */

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2rem 2.5rem;
    }

    .nav-name {
      text-decoration: none;
      display: flex;
      align-items: center;
    }

    .nav-name img {
      height: 80px;
      width: auto;
      display: block;
    }

    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }

    .nav-links a {
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color .2s;
    }

    .nav-links a:hover {
      color: var(--navy);
    }

    .lang-btn {
      font-family: var(--cond);
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      background: none;
      border: 1px solid #ddd;
      padding: .3rem .7rem;
      cursor: pointer;
      transition: color .2s, border-color .2s;
    }

    .lang-btn:hover {
      color: var(--navy);
      border-color: var(--navy);
    }

    /* PORTFOLIO */

    #works {
      padding: 0 2.5rem 3rem;
    }

    .portfolio-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      grid-auto-rows: calc((100vw - 9rem) * 0.169);
      gap: 1rem;
    }

    /* GRID */

    .pg-v1 { grid-column: 1 / 4; grid-row: 1 / 3; }
    .pg-v2 { grid-column: 4 / 5; grid-row: 1 / 3; }
    .pg-v3 { grid-column: 5 / 6; grid-row: 1 / 2; }
    .pg-v4 { grid-column: 5 / 6; grid-row: 2 / 3; }

    .pg-v5 { grid-column: 1 / 2; grid-row: 3 / 5; }
    .pg-v6 { grid-column: 2 / 3; grid-row: 3 / 5; }
    .pg-v7 { grid-column: 3 / 6; grid-row: 3 / 5; }

    /* NOVA ROW */

    .pg-v8 { grid-column: 1 / 3; grid-row: 5 / 7; }
    .pg-v9 { grid-column: 3 / 4; grid-row: 5 / 7; }
    .pg-v10 { grid-column: 4 / 6; grid-row: 5 / 7; }

    /* VIDEO CARDS */

    .vcard {
      position: relative;
      overflow: hidden;
      cursor: pointer;
      background: #f0f0f0;
    }

    .yt-facade {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      transition: transform .4s ease;
    }

    .vcard:hover .yt-facade {
      transform: scale(1.04);
    }

    .vcard iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    .yt-play {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 48px;
      height: 48px;
      background: rgba(0,0,0,.65);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s;
      pointer-events: none;
    }

    .vcard:hover .yt-play {
      background: rgba(0,0,0,.85);
    }

    .yt-play::after {
      content: '';
      border-style: solid;
      border-width: 9px 0 9px 16px;
      border-color: transparent transparent transparent #fff;
      margin-left: 3px;
    }

    .pg-v1 .yt-play,
    .pg-v7 .yt-play,
    .pg-v8 .yt-play,
    .pg-v10 .yt-play {
      width: 60px;
      height: 60px;
    }

    .pg-v1 .yt-play::after,
    .pg-v7 .yt-play::after,
    .pg-v8 .yt-play::after,
    .pg-v10 .yt-play::after {
      border-width: 12px 0 12px 20px;
    }

    .card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,.65) 0%, transparent 55%);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 1rem;
      pointer-events: none;
    }

    .vcard-title {
      font-family: var(--serif);
      font-size: .8rem;
      font-weight: 300;
      color: #fff;
      line-height: 1.4;
    }

    .pg-v1 .vcard-title,
    .pg-v7 .vcard-title,
    .pg-v8 .vcard-title,
    .pg-v10 .vcard-title {
      font-size: 1rem;
    }

    /* SOBRE */

    #sobre {
      padding: 5rem 2.5rem;
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 4rem;
      border-top: 1px solid #eee;
    }

    .sobre-label {
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--muted);
      padding-top: .2rem;
    }

    .sobre-foto {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      flex-shrink: 0;
    }

    .sobre-body {
      display: flex;
      gap: 2rem;
      align-items: flex-start;
    }

    .sobre-hed {
      font-family: var(--serif);
      font-size: clamp(1.6rem, 2.5vw, 2.2rem);
      font-weight: 400;
      line-height: 1.3;
      margin-bottom: 1.5rem;
      color: #111;
    }

    .sobre-hed .dot { color: var(--blue); }

    .sobre-hed em {
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic;
    }

    .sobre-p {
      font-size: .9rem;
      color: #777;
      line-height: 1.9;
      max-width: 520px;
      margin-bottom: 1.8rem;
    }

    .sobre-tags {
      display: flex;
      flex-wrap: wrap;
      gap: .4rem;
    }

    .tag {
      font-size: .65rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      border: 1px solid #e0e0e0;
      padding: .25rem .7rem;
    }

    /* CONTATO */

    #contato {
      background: var(--navy);
      padding: 6rem 2.5rem;
    }

    .contato-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6rem;
      align-items: start;
    }

    .contato-hed {
      font-family: var(--serif);
      font-size: clamp(2rem, 4vw, 3.5rem);
      font-weight: 400;
      color: #fff;
      line-height: 1.2;
      margin-bottom: 3rem;
    }

    .contato-hed em {
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic;
      color: #fff;
    }

    .contato-list {
      display: flex;
      flex-direction: column;
    }

    .cl {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 0;
      border-bottom: 1px solid rgba(255,255,255,.08);
      text-decoration: none;
      transition: border-color .2s;
    }

    .cl:hover {
      border-bottom-color: rgba(255,255,255,.3);
    }

    .cl-label {
      font-size: .65rem;
      font-weight: 600;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: rgba(255,255,255,.35);
    }

    .cl-val {
      font-size: .9rem;
      color: rgba(255,255,255,.7);
    }

    .cl-arrow {
      color: rgba(255,255,255,.25);
    }

    /* FOOTER */

    footer {
      background: #111e2b;
      padding: 1.8rem 2.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-name {
      display: flex;
      align-items: center;
      gap: .4rem;
      text-decoration: none;
    }

    .footer-name .fn-serif {
      font-family: var(--serif);
      font-size: .95rem;
      font-weight: 400;
      color: rgba(255,255,255,.3);
    }

    .footer-name .fn-sans {
      font-family: var(--cond);
      font-size: .95rem;
      font-weight: 400;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: rgba(255,255,255,.3);
    }

    .footer-copy {
      font-size: .62rem;
      font-weight: 600;
      letter-spacing: .1em;
      color: rgba(255,255,255,.18);
    }

    /* RESPONSIVE */

    @media (max-width: 900px) {

      .portfolio-grid {
        grid-template-columns: repeat(3, 1fr);
        grid-auto-rows: calc((100vw - 5rem) * 0.28);
      }

      .pg-v1 { grid-column: 1 / 3; grid-row: 1 / 3; }
      .pg-v2 { grid-column: 3 / 4; grid-row: 1 / 3; }
      .pg-v3 { grid-column: 1 / 2; grid-row: 3 / 4; }
      .pg-v4 { grid-column: 2 / 3; grid-row: 3 / 4; }

      .pg-v5 { grid-column: 3 / 4; grid-row: 3 / 5; }
      .pg-v6 { grid-column: 1 / 2; grid-row: 4 / 6; }
      .pg-v7 { grid-column: 2 / 4; grid-row: 4 / 6; }

      .pg-v8 { grid-column: 1 / 3; grid-row: 6 / 8; }
      .pg-v9 { grid-column: 3 / 4; grid-row: 6 / 8; }
      .pg-v10 { grid-column: 1 / 4; grid-row: 8 / 10; }
    }

    @media (max-width: 600px) {

      nav {
        padding: 1.2rem;
        flex-direction: column;
        align-items: flex-start;
        gap: 1rem;
      }

      .nav-name img {
        height: 48px;
      }

      .nav-links {
        gap: 1.2rem;
      }

      .nav-links a {
        font-size: .68rem;
      }

      #works {
        padding: 0 1.2rem 2rem;
      }

      .portfolio-grid {
        grid-template-columns: repeat(2, 1fr);
        grid-auto-rows: calc((100vw - 2.4rem - 1rem) * 0.56 / 2);
        gap: .6rem;
      }

      .pg-v1 { grid-column: 1 / 3; grid-row: 1 / 2; }
      .pg-v2 { grid-column: 1 / 2; grid-row: 2 / 4; }
      .pg-v3 { grid-column: 2 / 3; grid-row: 2 / 3; }
      .pg-v4 { grid-column: 2 / 3; grid-row: 3 / 4; }

      .pg-v5 { grid-column: 1 / 2; grid-row: 4 / 6; }
      .pg-v6 { grid-column: 2 / 3; grid-row: 4 / 6; }
      .pg-v7 { grid-column: 1 / 3; grid-row: 6 / 7; }

      .pg-v8 { grid-column: 1 / 3; grid-row: 7 / 8; }
      .pg-v9 { grid-column: 1 / 2; grid-row: 8 / 10; }
      .pg-v10 { grid-column: 2 / 3; grid-row: 8 / 10; }

      #sobre {
        grid-template-columns: 1fr;
        gap: 1.5rem;
        padding: 3rem 1.2rem;
      }

      .sobre-body {
        flex-direction: column;
      }

      .sobre-foto {
        width: 90px;
        height: 90px;
      }

      #contato {
        padding: 4rem 1.2rem;
      }

      .contato-grid {
        grid-template-columns: 1fr;
        gap: 2.5rem;
      }

      footer {
        padding: 1.5rem 1.2rem;
      }
    }
  </style>
</head>
